name = "howclankerareyou"
main = "src/index.js"
compatibility_date = "2026-01-01"
workers_dev = true

# Static frontend; the Worker handles /api/*, assets serve everything else.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Sessions, per-question scores, final results (for percentiles + share links).
# Moved off ENAM (e0960c17-…) to WNAM on 2026-07-03 to dodge a Cloudflare
# Durable-Objects incident in ENAM; move back once that region is healthy.
[[d1_databases]]
binding = "DB"
database_name = "howclankerareyou-wnam"
database_id = "73ce6cc7-40a8-4c3f-8d33-b705f0474694"

[[routes]]
pattern = "howclankerareyou.com"
custom_domain = true

[[routes]]
pattern = "www.howclankerareyou.com"
custom_domain = true

[[routes]]
pattern = "howclankerareyou.nikliolios.com"
custom_domain = true

# Abuse guards. Per-IP rate limits cap velocity; each /api/score fans out
# several upstream model calls, so it's the expensive one.
[[unsafe.bindings]]
name = "SCORE_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 40, period = 60 }   # per-IP scoring calls / minute

[[unsafe.bindings]]
name = "SESSION_RL"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 20, period = 60 }   # per-IP new sessions / minute

[vars]
# "1" forces the deterministic mock (src/mock.js). "0" uses real HF inference
# via the HF_TOKEN secret. Live on real inference (HF PRO, $2/mo included credit).
MOCK_INFERENCE = "0"

# Global backstop: max scoring calls per UTC day across ALL users. Catches
# distributed abuse that per-IP limits miss. Beyond this, /api/score returns
# 429 until the next day. Tune freely — the real dollar cap is HF's own
# spending limit. ~25k ≈ ~1k full plays/day.
DAILY_CALL_CAP = "25000"

# Secrets (set with `wrangler secret put`):
#   HF_TOKEN — HuggingFace token; real inference via router.huggingface.co.
