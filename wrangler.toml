name = "howclankerareyou"
main = "src/index.js"
compatibility_date = "2026-01-01"
workers_dev = true

# Static frontend; the Worker handles /api/*, assets serve everything else.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Worker runs first on every request so it can log traffic events and
# host-route the analytics subdomain; it then serves assets via env.ASSETS.
run_worker_first = true

# Sessions, per-question scores, final results (for percentiles + share links).
# Moved off ENAM (e0960c17-…) to WNAM on 2026-07-03 to dodge a Cloudflare
# Durable-Objects incident in ENAM; move back once that region is healthy.
[[d1_databases]]
binding = "DB"
database_name = "howclankerareyou-wnam"
database_id = "73ce6cc7-40a8-4c3f-8d33-b705f0474694"

[[routes]]
pattern = "howclankerareyou.com"
custom_domain = true

[[routes]]
pattern = "www.howclankerareyou.com"
custom_domain = true

[[routes]]
pattern = "howclankerareyou.nikliolios.com"
custom_domain = true

# Admin analytics dashboard (Google-OAuth gated to ADMIN_EMAILS).
[[routes]]
pattern = "analytics.howclankerareyou.com"
custom_domain = true

# Abuse guards. Per-IP rate limits cap velocity; each /api/score fans out
# several upstream model calls, so it's the expensive one.
[[unsafe.bindings]]
name = "SCORE_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 40, period = 60 }   # per-IP scoring calls / minute

[[unsafe.bindings]]
name = "SESSION_RL"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 20, period = 60 }   # per-IP new sessions / minute

[vars]
# "1" forces the deterministic mock (src/mock.js). "0" uses real HF inference
# via the HF_TOKEN secret. Live on real inference (HF PRO, $2/mo included credit).
MOCK_INFERENCE = "0"

# Global backstop: max scoring calls per UTC day across ALL users. Catches
# distributed abuse that per-IP limits miss. Beyond this, /api/score returns
# 429 until the next day. Tune freely — the real dollar cap is HF's own
# spending limit. ~25k ≈ ~1k full plays/day.
DAILY_CALL_CAP = "25000"

# Analytics dashboard access. GOOGLE_CLIENT_ID is public; ADMIN_EMAILS is the
# comma-separated allowlist that can view analytics.howclankerareyou.com.
GOOGLE_CLIENT_ID = "414111145118-hc7g5q15rso6jclr1isp1hrv5u23lj3d.apps.googleusercontent.com"
ADMIN_EMAILS = "nliolios24@gmail.com"

# Secrets (set with `wrangler secret put`):
#   HF_TOKEN             — HuggingFace token; real inference via router.huggingface.co.
#   GOOGLE_CLIENT_SECRET — OAuth client secret for the analytics dashboard login.
#   TWITTERAPI_KEY       — twitterapi.io key for the "diagnose a Twitter account" feature.

# --- Staging: separate worker + D1 at staging.howclankerareyou.com ----------
# Deploy with `wrangler deploy --env staging`. Named envs don't inherit
# bindings/vars/routes, so they're redefined here. main/assets/compat inherit.
# Prod is never touched by a staging deploy.
[env.staging.vars]
MOCK_INFERENCE = "0"
DAILY_CALL_CAP = "3000"          # low ceiling — bounds test spend on the shared HF credit
BENCH = "1"                      # enables /api/_bench (latency probe); NEVER set in prod

[[env.staging.routes]]
pattern = "staging.howclankerareyou.com"
custom_domain = true

[[env.staging.d1_databases]]
binding = "DB"
database_name = "howclankerareyou-staging"
database_id = "4aefcc3d-3996-44fd-a7d5-163013598702"

[[env.staging.unsafe.bindings]]
name = "SCORE_RL"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 40, period = 60 }

[[env.staging.unsafe.bindings]]
name = "SESSION_RL"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 20, period = 60 }

[[env.staging.unsafe.bindings]]
name = "DIAGNOSE_RL"
type = "ratelimit"
namespace_id = "2003"
simple = { limit = 6, period = 60 }   # per-IP Twitter diagnoses / minute (costly)
