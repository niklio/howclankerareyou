<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Azeret+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#14110f;--paper:#f2efe6;--mag:#ff1e79;--cyan:#00a6c4;--line:#d8d3c4;}
  *{box-sizing:border-box;margin:0}
  html,body{width:1200px;height:630px}
  body{background:var(--paper);color:var(--ink);font-family:"Azeret Mono",monospace;overflow:hidden;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:40px 40px;position:relative;padding:72px 76px;display:flex;flex-direction:column;justify-content:space-between}
  .top{display:flex;align-items:center;gap:26px}
  .tag{border:1px solid var(--ink);padding:6px 16px;font-size:18px;letter-spacing:.2em;text-transform:uppercase}
  .head{width:96px;height:96px}
  .title{font-family:Orbitron,sans-serif;font-weight:900;text-transform:uppercase;font-size:118px;line-height:.98;
    letter-spacing:.01em;text-shadow:5px 0 var(--cyan),-5px 0 var(--mag)}
  .sub{color:var(--mag);font-size:30px;margin-top:6px}
  .row{display:flex;justify-content:space-between;align-items:flex-end}
  .chips{font-size:26px}
  .chips .c{color:var(--cyan);font-weight:600}
  .chips .m{color:var(--mag);font-weight:600}
  .url{font-family:Orbitron,sans-serif;font-weight:700;font-size:30px;background:var(--mag);color:#fff;padding:10px 20px;box-shadow:8px 8px 0 var(--ink)}
</style></head><body>
  <div class="top">
    <svg class="head" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:112px;height:112px">
      <line x1="50" y1="14" x2="50" y2="26" stroke="#14110f" stroke-width="4"/>
      <circle cx="50" cy="12" r="5" fill="#ff1e79"/>
      <rect x="24" y="26" width="52" height="46" rx="11" fill="#14110f"/>
      <rect x="18" y="42" width="8" height="16" rx="3" fill="#14110f"/>
      <rect x="74" y="42" width="8" height="16" rx="3" fill="#14110f"/>
      <rect x="32" y="40" width="36" height="18" rx="6" fill="#0a0a0c"/>
      <circle cx="42" cy="49" r="5" fill="#00a6c4"/>
      <circle cx="58" cy="49" r="5" fill="#ff1e79"/>
    </svg>
  </div>
  <div>
    <h1 class="title">how clanker<br>are you?</h1>
    <p class="sub">// a KL-divergence Turing test, reversed.</p>
  </div>
  <div class="row">
    <p class="chips"><span class="c">low divergence</span> = write like a model &nbsp;·&nbsp; <span class="m">high</span> = human</p>
    <span class="url">howclankerareyou.com</span>
  </div>
</body></html>
